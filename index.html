var IX={rei:{n:'神代 零',t:['主人公','F级','16岁','Observer #7','平民出身'],d:'亲生父母不明，由星ノ宮平凡的神代家收养。3岁起秘密使用终端能力，可读写世界底层代码。外表F级劣等生，实则观测者零时可发挥S级实力。左手腕有天生几何状印记。'},akane:{n:'天宮 朱音',t:['傲娇','幼驯染','火属性A+级','深红高马尾','琥珀瞳','黑丝裤袜'],d:'天宮分家长女，帝国五大家族之首的千金。10岁转学星ノ宮，在废坑与零偶遇。六年渐进式傲娇——对外完美优等生，对零全部崩坏。校服配黑色裤袜。'},koyuki:{n:'神代 小雪',t:['妹妹','天才','冰属性','银白短发','冰蓝瞳','151cm','白丝'],d:'零的妹妹，14岁。冰晶变异体质，14岁跳级帝都特别英才学院少年班。校服配白色小腿袜，私服配白色裤袜。全能型天赋怪。零就是她世界的中心。'},eruna:{n:'艾露娜·温德尔',t:['精灵族','学年首席','A+级风属性','淡金长发','翡翠瞳','过膝袜'],d:'精灵王国留学生，17岁。天生魔力视觉能看见粒子流动。知识欲极其旺盛，对恋爱概念完全天然。零的"共同研究者"。'},maya:{n:'黒鉄真夜',t:['魔族学妹','B+级暗属性','异色瞳','黑短袜','战斗天才'],d:'魔族学妹，14岁中等部三年。左深红右金异色瞳，极小二角为感情开关。暗属性战斗能力极强但理论苦手。'},sara:{n:'サラ',t:['兽人少女','猫耳','北方山脉出身'],d:'灰银发猫耳兽人少女，约14-15岁。在帝都魔晶工厂做黑工，工作效率异常高。北方山脉出身，可能知道与零出生地相关的线索。'},alice:{n:'アリス',t:['商社経営','市場通','姉御肌'],d:'25岁商社经营者，帝都中央市场。数字异常敏锐，零的商业伙伴。姉貴分的存在，无恋爱线。'},shiori:{n:'白羽栞',t:['Observer #6','时计塔','观测者'],d:'身份不明。偶尔出现在星導学園时计塔附近。似乎知道关于"观测者"的事情。详细信息待故事推进后解锁。'},eve:{n:'Eve',t:['AI助手','Terminal v1.0.7','机械理性'],d:'终端AI助手，3岁起绑定零。机械式应答，只返回必要信息，无感情表现。称零为Observer #7。'},kenichiro:{n:'神代 健一郎',t:['养父','镇公所户籍员','E级平民'],d:'零的养父。星ノ宮镇公所的小职员，性格温和。在诊所前发现被遗弃的零并收养。'},hoshinomiya:{n:'星ノ宮',t:['首都圏外縁','鉱山町','人口5万'],d:'帝都星京郊外约一小时车程的矿业小镇。帝国前五规模的魔矿矿山所在地。零的故乡。'},seido:{n:'星導学園',t:['顶级魔法学院','高中大学融合','魔力增幅装置','校舍区'],d:'帝国最古老权威魔法学院。高等部(2年)+专门部(3年)+研究部。校内魔力密度为外界3.2倍。设有家族寮，特待科学费全免。'},terminal:{n:'终端',t:['CLI命令行','底层代码访问','Token消耗','观测者效应'],d:'零3岁时觉醒的意识内命令行界面。可编译执行魔法脚本，操控世界底层代码。观测者越多功能越弱。'},observer:{n:'观测者效应',t:['终端最大限制','量子场干涉'],d:'周围人数越多终端越不稳。0人时S级输出，30人时F级，200人以上近乎失效。零在矿山废坑中通过反复实验实证。'},mana_rank:{n:'魔力等级',t:['S~F级','血统决定','7段評価'],d:'七级魔力评估体系。S级低于0.01%，A级约0.1%，F级约3%。魔法才能主要由血统决定。'},ril:{n:'利尔(Ril)',t:['货币','铜货·银货·晶货'],d:'帝国通用货币。平民午餐约50リル，月收平均3000-5000リル。晶货以魔晶为原料，用于高额交易。'},voidborn:{n:'虚空种',t:['世界公敌','魔力异常聚集'],d:'对所有使用魔力的生命体具有无差别敌意的危险存在。外形无固定形态。帝国军队的主要对抗目标。'}};

function md2html(md){
  var lines=md.split('\n'),out='',inTerm=false,termTitle='',termLines=[],termType='',inP=false;
  function flushP(){if(inP){out+='</p>\n';inP=false;}}
  function flushTerm(){
    if(termLines.length===0)return;
    var title=termTitle||'Terminal';var tclass='tm'+(termType==='win'?' win':'');
    out+='<div class="'+tclass+'"><div class="tm-h"><div class="tm-d r"></div><div class="tm-d y"></div><div class="tm-d g"></div><span class="tm-t">'+title+'</span></div><div class="tm-b">';
    for(var i=0;i<termLines.length;i++){
      var tl=termLines[i];
      if(tl===''){out+='\n';continue;}
      if(/^&gt;\s/.test(tl)){out+='<span class="pr">&gt; </span><span class="cm">'+tl.replace(/^&gt;\s/,'')+'</span>\n';}
      else if(/^\[WARNING:/.test(tl)){out+='<span class="wn">'+tl+'</span>\n';}
      else if(/^\[ERROR:/.test(tl)||/^\[ALERT/.test(tl)){out+='<span class="er">'+tl+'</span>\n';}
      else if(/^\[/.test(tl)){out+='<span class="out">'+tl+'</span>\n';}
      else out+='<span class="inf">'+tl+'</span>\n';
    }
    out+='</div></div>\n';
    termLines=[];termTitle='';termType='';inTerm=false;
  }
  for(var i=0;i<lines.length;i++){
    var l=lines[i];
    if(inTerm){
      if(/^```/.test(l)){flushTerm();continue;}
      if(i===0||(termLines.length===0&&l.trim()==='')){termTitle=l.trim();continue;}
      termLines.push(l);continue;
    }
    if(/^```terminal/.test(l)){flushP();inTerm=true;termType=/^```terminal-win/.test(l)?'win':'';continue;}
    if(/^```/.test(l)){flushP();out+='<pre>';var j=i+1;while(j<lines.length&&!/^```/.test(lines[j])){out+=lines[j]+'\n';j++;}i=j;out+='</pre>\n';continue;}
    if(/^##\s/.test(l)){flushP();out+='<div class="st">'+l.replace(/^##\s/,'')+'</div>\n';continue;}
    if(/^---\s*$/.test(l)||/^\*\*\*\s*$/.test(l)){flushP();out+='<div class="dv">＊ ＊ ＊</div>\n';continue;}
    if(l.trim()===''){flushP();continue;}
    if(/^<span class="ix/.test(l)||/^<div class="(ch|chc|cb|cd|dv|st|tm|pg)/.test(l)||/^<\/div>/.test(l)||/^<button/.test(l)){flushP();out+=l+'\n';continue;}
    var txt=l.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');
    if(!inP){out+='<p>';inP=true;}
    else out+='<br>';
    out+=txt;
  }
  flushP();flushTerm();return out;
}

async function loadPanel(id){
  var el=document.getElementById('p-'+id);
  el.innerHTML='<div class="loading">加载中...</div>';
  var def=panelDefs[id];if(!def)return;
  try{
    var parts=[];var pgBreaks=def.pgs||[];
    for(var i=0;i<def.files.length;i++){
      var resp=await fetch(def.files[i]+'?t='+Date.now());if(!resp.ok)throw new Error(def.files[i]+' not found');
      parts.push(md2html(await resp.text()));
    }
    var header='<div class="ch"><div class="cn">'+(id==='prologue'?'序章':'Chapter 01')+'</div><h2>'+def.title.split(' — ')[1]+'</h2><div class="cs">'+def.subtitle+'</div></div>\n';
    var html='';var pg=0;
    for(var i=0;i<parts.length;i++){
      if(pgBreaks.indexOf(i)>=0&&i>0){html+='<!-- PG -->\n';pg++;}
      html+=parts[i]+'\n';
    }
    el.innerHTML=header+html;
    el.dataset.loaded='1';
    PG(el);bindChoices(el);
  }catch(e){el.innerHTML='<div class="loading">加载失败: '+e.message+'</div>';}
}

function PG(el){
  var c=el.innerHTML.split('<!-- PG -->');if(c.length<2)return;
  var h='';for(var i=0;i<c.length;i++){h+='<div class="pg-page'+(i===0?' on':'')+'" data-pg="'+i+'">'+c[i]+'</div>'}
  h+='<div class="pg-nav"><button class="pg-prev" disabled>◀ 上一页</button><span class="pg-info">1 / '+c.length+'</span><button class="pg-next">下一页 ▶</button></div>';
  el.innerHTML=h;var pg=0;
  function go(n){pg=Math.max(0,Math.min(c.length-1,n));el.querySelectorAll('.pg-page').forEach(function(p,i){p.classList.toggle('on',i===pg)});el.querySelector('.pg-prev').disabled=pg===0;el.querySelector('.pg-next').disabled=pg===c.length-1;el.querySelector('.pg-info').textContent=(pg+1)+' / '+c.length;el.scrollTop=0;document.getElementById('mn').scrollTop=0}
  el.querySelector('.pg-prev').onclick=function(){go(pg-1)};el.querySelector('.pg-next').onclick=function(){go(pg+1)};
}

var S={flags:{},choices:[]};
try{var s=localStorage.getItem('tp_state');if(s){var p=JSON.parse(s);S.flags=p.flags||{};S.choices=p.choices||[]}}catch(e){}
function sv(){try{localStorage.setItem('tp_state',JSON.stringify({flags:S.flags,choices:S.choices}))}catch(e){}}
function ar(k,v){S.flags[k]=(S.flags[k]||0)+v;sv();upd()}function rr(k,v){S.flags[k]=Math.max(0,(S.flags[k]||0)-v);sv();upd()}

var pls=document.querySelectorAll('.pn'),nis=document.querySelectorAll('.ni');
nis.forEach(function(b){b.addEventListener('click',function(){
  var id=this.dataset.p;
  nis.forEach(function(x){x.classList.remove('on')});this.classList.add('on');
  pls.forEach(function(p){p.classList.remove('on')});
  var t=document.getElementById('p-'+id);if(t){t.classList.add('on');t.scrollTop=0;loadPanel(id);document.getElementById('mn').scrollTop=0}
})});

function bindChoices(el){
  el.addEventListener('click',function(e){
    var b=e.target.closest('.cb');if(!b)return;
    var u=e.target.closest('.un');if(u){undoChoice(u.dataset.cid);return;}
    var cid=b.dataset.c,oi=parseInt(b.dataset.o),bl=CC[cid];if(!bl)return;var opt=bl.opts[oi];
    var pi=S.choices.findIndex(function(c){return c.id===cid});
    if(pi>=0){var old=S.choices[pi];if(old.r)Object.entries(old.r).forEach(function(e){rr(e[0],e[1])});S.choices.splice(pi,1)}
    S.choices.push({id:cid,label:bl.label,chosen:opt.l,r:opt.r||{},e:opt.e});if(opt.r)Object.entries(opt.r).forEach(function(e){ar(e[0],e[1])});sv();
    b.closest('.chc').innerHTML='<div class="cd">▸ 已選択：<b>'+opt.l+'</b> —— '+opt.e+' <span class="un" data-cid="'+cid+'">↩ 取り消し</span></div>';upd();
  });
}
function undoChoice(cid){
  var idx=S.choices.findIndex(function(c){return c.id===cid});if(idx<0)return;
  var old=S.choices[idx];if(old.r)Object.entries(old.r).forEach(function(e){rr(e[0],e[1])});S.choices.splice(idx,1);sv();
  var bl=CC[cid];if(!bl)return;var ls='ABCDEF',btns=bl.opts.map(function(o,i){return'<button class="cb '+ls[i].toLowerCase()+'" data-c="'+cid+'" data-o="'+i+'"><span class="lt">'+ls[i]+'</span>'+o.l+'</button>'}).join('');
  document.querySelectorAll('.chc,.cd').forEach(function(c){if((c.querySelector('[data-c="'+cid+'"]')||c.querySelector('.un[data-cid="'+cid+'"]'))&&!c.classList.contains('chc'))c.outerHTML='<div class="chc"><div class="cl">⚡ 選択肢</div>'+btns+'<div class="ch">（選択後に取り消し可能）</div></div>'});
}
function upd(){
  var rs=[{k:'akane',n:'朱音',c:'a'},{k:'koyuki',n:'小雪',c:'k'},{k:'eruna',n:'艾露娜',c:'e'},{k:'maya',n:'真夜',c:'m'}].filter(function(r){return S.flags[r.k]>0});
  var el=document.getElementById('tk'),tc=document.getElementById('tkc');
  if(!rs.length&&S.choices.length===0){el.style.display='none';return}
  el.style.display='block';
  var html='';
  if(rs.length>0){
    var mx=Math.max.apply(null,rs.map(function(r){return r.k==='koyuki'?S.flags[r.k]*1.5:S.flags[r.k]}));
    html+=rs.map(function(r){return'<div class="ri">'+r.n+': '+'❤'.repeat(Math.min(S.flags[r.k],5))+'</div><div class="rb '+r.c+'" style="width:'+Math.round(S.flags[r.k]/mx*100)+'%"></div>'}).join('');
  }
  html+='<div style="font-size:8px;opacity:.5;margin-top:2px">'+S.choices.length+'回選択</div>';
  tc.innerHTML=html;
}upd();
document.getElementById('tktitle').onclick=function(){var t=document.getElementById('tkc');t.style.display=t.style.display==='none'?'block':'none'};
document.getElementById('tkclear').onclick=function(){S.flags={};S.choices=[];sv();upd();};
loadPanel('prologue');
